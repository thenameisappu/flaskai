version: "3.9"

services:

  # ── PostgreSQL + RDKit ────────────────────────────────────────────────────
  db:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.db
    image: molecule-db:local
    container_name: rdkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── FastAPI application ───────────────────────────────────────────────────
  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: ${BUILD_ENV:-production}
    image: molecule-api:local
    container_name: molecule-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5433
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MOLECULES_TABLE: ${MOLECULES_TABLE:-molecules}
      API_KEY_HASHES: ${API_KEY_HASHES}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "uvicorn api:app
        --host 0.0.0.0
        --port 8000
        --workers ${UVICORN_WORKERS:-4}
        --log-level ${LOG_LEVEL:-info}"
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3


volumes:
  postgres_data:
    driver: local

networks:
  backend:
    driver: bridge
