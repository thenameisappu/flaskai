services:

  # ── FastAPI application ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: molecule-api
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      API_KEY_HASHES: ${API_KEY_HASHES}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MOLECULES_TABLE: ${MOLECULES_TABLE}
      LOG_LEVEL: ${LOG_LEVEL}
      UVICORN_WORKERS: ${UVICORN_WORKERS}
      API_PORT: ${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT}/health')\"" ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    networks:
      - backend

networks:
  backend:
    driver: bridge
