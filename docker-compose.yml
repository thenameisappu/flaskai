services:

  # ── PostgreSQL + RDKit ────────────────────────────────────────────────────
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    platform: linux/amd64
    container_name: rdkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-192602@Bb}
      POSTGRES_DB: ${DB_NAME:-flaskdb}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - backend

  # ── FastAPI application ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: molecule-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT_INTERNAL:-5432}
      DB_NAME: ${DB_NAME:-flaskdb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-192602@Bb}
      API_KEY_HASHES: ${API_KEY_HASHES}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MOLECULES_TABLE: ${MOLECULES_TABLE}
      LOG_LEVEL: ${LOG_LEVEL}
      UVICORN_WORKERS: ${UVICORN_WORKERS}
      API_PORT: ${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT:-8000}/health')\"" ]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 10
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
