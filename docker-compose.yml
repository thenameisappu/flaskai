version: "3.9"

services:

  postgres:
    image: mcs07/postgres-rdkit
    container_name: rdkit-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-192602@Bb}
      POSTGRES_DB: ${DB_NAME:-flaskai}
    ports:
      - "5432:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: molecule-api
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5433
      DB_NAME: ${DB_NAME:-flaskai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-192602@Bb}
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  webapp:
    build: .
    container_name: molecule-webapp
    restart: always
    depends_on:
      - api
    environment:
      DB_HOST: postgres
      DB_PORT: 5433
      DB_NAME: ${DB_NAME:-flaskai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "8501:8501"
    command: streamlit run App.py --server.port 8501 --server.address 0.0.0.0

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"

volumes:
  postgres_data:
